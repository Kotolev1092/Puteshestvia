<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Куда поехать?</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="theme-switch">
        <label class="switch">
            <input type="checkbox" id="theme-toggle">
            <span class="slider"></span>
        </label>
        <span class="theme-label">🌙</span>
    </div>

    <div class="container">
        <h1>🤔 Куда поехать?</h1>
        <p class="time">Выберите интересы и нажмите «Подобрать направление»</p>

        <form method="POST">
            <div class="interests" style="justify-content: center; margin-bottom: 20px;">
                <label><input type="checkbox" name="interests" value="culture"> Культура</label>
                <label><input type="checkbox" name="interests" value="nature"> Природа</label>
                <label><input type="checkbox" name="interests" value="food"> Гастрономия</label>
                <label><input type="checkbox" name="interests" value="nightlife"> Ночная жизнь</label>
            </div>
            <div style="text-align: center;">
                <button type="submit" style="padding: 12px 30px; background: var(--btn-bg); color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 16px;">
                    🎯 Подобрать направление
                </button>
            </div>
        </form>

        {% if suggestions %}
            <h2>✨ Рекомендованные направления</h2>
            <div class="places-grid">
                {% for city in suggestions %}
                    <div class="place-card">
                        <div class="place-name">{{ city.name }}</div>
                        <p class="place-desc">{{ city.description }}</p>
                        <div class="place-meta">
                            <span>🌤 {{ city.season }}</span>
                            <span>✈️ {{ city.price }}</span>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <div style="text-align: center; margin-top: 30px;">
            <a href="{{ url_for('index') }}">← На главную</a>
        </div>
    </div>

    
    <script>
        const toggle = document.getElementById('theme-toggle');
        toggle.addEventListener('change', function() {
            document.body.classList.toggle('dark-theme', this.checked);
            localStorage.setItem('theme', this.checked ? 'dark' : 'light');
        });
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-theme');
            toggle.checked = true;
        }
    </script>
</body>
</html>
